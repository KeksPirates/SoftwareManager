changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot[bot]
      - github-actions[bot]
  categories:
    - title: "New Features"
      labels:
        - enhancement
        - feature
    - title: "Bug Fixes"
      labels:
        - bug
        - fix
    - title: "Documentation"
      labels:
        - documentation
    - title: "Maintenance"
      labels:
        - chore
        - refactor
        - testing
        - build
    - title: "Dependencies"
      labels:
        - dependencies
    - title: "Other Changes"
      labels:
        - "*"